app = "fx9-bot"

[build]
  dockerfile = "Dockerfile"

[[mounts]]
  source = "botdata"
  destination = "/data"

[http_service]
  internal_port = 10001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
