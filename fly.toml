# fly.toml app configuration file generated for fx9-new-bot-sys on 2026-06-11T09:09:39Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fx9-new-bot-sys'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[[mounts]]
  source = 'botdata'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
